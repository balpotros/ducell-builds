<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Task List</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background: #0f172a; }
    .task-done { opacity: 0.5; }
    .task-done span { text-decoration: line-through; }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
  <div class="w-full max-w-md">
    <h1 class="text-3xl font-bold text-white mb-8 text-center tracking-tight">Task List</h1>

    <!-- Add task -->
    <form id="addForm" class="flex gap-2 mb-6">
      <input
        id="titleInput"
        type="text"
        placeholder="Add a task..."
        class="flex-1 bg-slate-800 text-white placeholder-slate-500 border border-slate-700 rounded-xl px-4 py-3 outline-none focus:border-indigo-500 transition"
        autocomplete="off"
      />
      <button
        type="submit"
        class="bg-indigo-600 hover:bg-indigo-500 active:bg-indigo-700 text-white font-semibold px-5 py-3 rounded-xl transition"
      >Add</button>
    </form>

    <!-- Task list -->
    <ul id="taskList" class="space-y-2"></ul>

    <!-- Empty state -->
    <p id="emptyState" class="text-slate-500 text-center mt-8 hidden">No tasks yet. Add one above!</p>
  </div>

  <script>
    const API = 'https://165.227.42.130.nip.io';
    let tasks = [];

    async function loadTasks() {
      const res = await fetch(`${API}/tasks`);
      tasks = await res.json();
      render();
    }

    function render() {
      const list = document.getElementById('taskList');
      const empty = document.getElementById('emptyState');
      list.innerHTML = '';
      if (tasks.length === 0) { empty.classList.remove('hidden'); return; }
      empty.classList.add('hidden');
      tasks.forEach(task => {
        const li = document.createElement('li');
        li.className = `flex items-center gap-3 bg-slate-800 border border-slate-700 rounded-xl px-4 py-3 ${task.done ? 'task-done' : ''}`;
        li.innerHTML = `
          <button onclick="toggleTask(${task.id}, ${!task.done})"
            class="w-6 h-6 flex-shrink-0 rounded-full border-2 ${task.done ? 'bg-indigo-500 border-indigo-500' : 'border-slate-600 hover:border-indigo-400'} transition flex items-center justify-center">
            ${task.done ? '<svg class="w-3.5 h-3.5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"/></svg>' : ''}
          </button>
          <span class="flex-1 text-white text-sm">${escHtml(task.title)}</span>
          <button onclick="deleteTask(${task.id})" class="text-slate-600 hover:text-red-400 transition ml-1">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
          </button>
        `;
        list.appendChild(li);
      });
    }

    function escHtml(s) {
      return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    async function toggleTask(id, done) {
      await fetch(`${API}/tasks/${id}`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ done })
      });
      loadTasks();
    }

    async function deleteTask(id) {
      await fetch(`${API}/tasks/${id}`, { method: 'DELETE' });
      loadTasks();
    }

    document.getElementById('addForm').addEventListener('submit', async e => {
      e.preventDefault();
      const input = document.getElementById('titleInput');
      const title = input.value.trim();
      if (!title) return;
      input.value = '';
      await fetch(`${API}/tasks`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ title })
      });
      loadTasks();
    });

    loadTasks();
  </script>
</body>
</html>
