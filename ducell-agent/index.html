<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>To-Do</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 60px 16px;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      width: 100%;
      max-width: 480px;
      overflow: hidden;
    }

    .card-header {
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      padding: 28px 28px 24px;
      color: #fff;
    }

    .card-header h1 {
      font-size: 1.6rem;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    .stats {
      margin-top: 6px;
      font-size: 0.85rem;
      opacity: 0.8;
    }

    .input-row {
      display: flex;
      gap: 8px;
      padding: 20px 20px 12px;
      border-bottom: 1px solid #f0f0f0;
    }

    .input-row input {
      flex: 1;
      border: 1.5px solid #e5e7eb;
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
      color: #111;
    }

    .input-row input:focus { border-color: #6366f1; }
    .input-row input::placeholder { color: #aaa; }

    .btn-add {
      background: #6366f1;
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 10px 16px;
      font-size: 1.2rem;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      line-height: 1;
    }

    .btn-add:hover { background: #4f46e5; }
    .btn-add:active { transform: scale(0.95); }

    .filter-bar {
      display: flex;
      gap: 6px;
      padding: 10px 20px;
      border-bottom: 1px solid #f0f0f0;
    }

    .filter-btn {
      border: none;
      background: none;
      font-size: 0.8rem;
      font-weight: 600;
      color: #9ca3af;
      cursor: pointer;
      padding: 4px 10px;
      border-radius: 6px;
      transition: background 0.15s, color 0.15s;
    }

    .filter-btn.active { background: #ede9fe; color: #6366f1; }
    .filter-btn:hover:not(.active) { background: #f3f4f6; color: #374151; }

    .task-list {
      list-style: none;
      padding: 8px 0;
      min-height: 60px;
    }

    .task-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 20px;
      border-bottom: 1px solid #f9f9f9;
      transition: background 0.15s;
      animation: slideIn 0.2s ease;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .task-item:last-child { border-bottom: none; }
    .task-item:hover { background: #fafafa; }

    .task-item input[type="checkbox"] {
      appearance: none;
      width: 20px;
      height: 20px;
      border: 2px solid #d1d5db;
      border-radius: 6px;
      cursor: pointer;
      flex-shrink: 0;
      transition: background 0.2s, border-color 0.2s;
      position: relative;
    }

    .task-item input[type="checkbox"]:checked {
      background: #6366f1;
      border-color: #6366f1;
    }

    .task-item input[type="checkbox"]:checked::after {
      content: "";
      position: absolute;
      left: 4px; top: 1px;
      width: 6px; height: 10px;
      border: 2px solid #fff;
      border-top: none; border-left: none;
      transform: rotate(45deg);
    }

    .task-text {
      flex: 1;
      font-size: 0.95rem;
      color: #1f2937;
      transition: color 0.2s;
      word-break: break-word;
    }

    .task-item.done .task-text {
      color: #9ca3af;
      text-decoration: line-through;
    }

    .btn-delete {
      background: none;
      border: none;
      cursor: pointer;
      color: #d1d5db;
      font-size: 1rem;
      padding: 4px;
      border-radius: 6px;
      line-height: 1;
      transition: color 0.15s, background 0.15s;
      flex-shrink: 0;
    }

    .btn-delete:hover { color: #ef4444; background: #fef2f2; }

    .empty {
      text-align: center;
      padding: 40px 20px;
      color: #d1d5db;
      font-size: 0.9rem;
    }

    .card-footer {
      padding: 12px 20px;
      border-top: 1px solid #f0f0f0;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .footer-text { font-size: 0.8rem; color: #9ca3af; }

    .btn-clear {
      font-size: 0.8rem;
      color: #9ca3af;
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 6px;
      transition: color 0.15s, background 0.15s;
    }

    .btn-clear:hover { color: #ef4444; background: #fef2f2; }
  </style>
</head>
<body>

<div class="card">
  <div class="card-header">
    <h1>My Tasks</h1>
    <div class="stats" id="stats">0 tasks</div>
  </div>

  <div class="input-row">
    <input type="text" id="new-task" placeholder="Add a new task…" maxlength="200" />
    <button class="btn-add" id="btn-add" title="Add task">+</button>
  </div>

  <div class="filter-bar">
    <button class="filter-btn active" data-filter="all">All</button>
    <button class="filter-btn" data-filter="active">Active</button>
    <button class="filter-btn" data-filter="done">Done</button>
  </div>

  <ul class="task-list" id="task-list"></ul>

  <div class="card-footer">
    <span class="footer-text" id="footer-text"></span>
    <button class="btn-clear" id="btn-clear">Clear completed</button>
  </div>
</div>

<script>
  let tasks = JSON.parse(localStorage.getItem("tasks") || "[]");
  let filter = "all";

  const listEl     = document.getElementById("task-list");
  const input      = document.getElementById("new-task");
  const statsEl    = document.getElementById("stats");
  const footerEl   = document.getElementById("footer-text");
  const btnClear   = document.getElementById("btn-clear");

  function save() {
    localStorage.setItem("tasks", JSON.stringify(tasks));
  }

  function render() {
    const visible = tasks.filter(t =>
      filter === "all"    ? true :
      filter === "active" ? !t.done :
                             t.done
    );

    listEl.innerHTML = "";

    if (visible.length === 0) {
      listEl.innerHTML = `<li class="empty">${
        filter === "done" ? "No completed tasks yet." :
        filter === "active" ? "Nothing left to do!" :
        "Add your first task above."
      }</li>`;
    } else {
      visible.forEach(task => {
        const li = document.createElement("li");
        li.className = "task-item" + (task.done ? " done" : "");
        li.dataset.id = task.id;

        const cb = document.createElement("input");
        cb.type = "checkbox";
        cb.checked = task.done;
        cb.addEventListener("change", () => toggle(task.id));

        const span = document.createElement("span");
        span.className = "task-text";
        span.textContent = task.text;

        const del = document.createElement("button");
        del.className = "btn-delete";
        del.title = "Delete";
        del.innerHTML = "&#10005;";
        del.addEventListener("click", () => remove(task.id));

        li.append(cb, span, del);
        listEl.appendChild(li);
      });
    }

    const total  = tasks.length;
    const done   = tasks.filter(t => t.done).length;
    const active = total - done;

    statsEl.textContent = `${active} remaining · ${done} done`;
    footerEl.textContent = total ? `${total} task${total !== 1 ? "s" : ""} total` : "";
    btnClear.style.visibility = done > 0 ? "visible" : "hidden";
  }

  function addTask() {
    const text = input.value.trim();
    if (!text) return;
    tasks.unshift({ id: Date.now(), text, done: false });
    input.value = "";
    save();
    if (filter === "done") setFilter("all");
    else render();
  }

  function toggle(id) {
    const t = tasks.find(t => t.id === id);
    if (t) t.done = !t.done;
    save(); render();
  }

  function remove(id) {
    tasks = tasks.filter(t => t.id !== id);
    save(); render();
  }

  function setFilter(f) {
    filter = f;
    document.querySelectorAll(".filter-btn").forEach(b =>
      b.classList.toggle("active", b.dataset.filter === f)
    );
    render();
  }

  document.getElementById("btn-add").addEventListener("click", addTask);
  input.addEventListener("keydown", e => { if (e.key === "Enter") addTask(); });

  document.querySelectorAll(".filter-btn").forEach(b =>
    b.addEventListener("click", () => setFilter(b.dataset.filter))
  );

  btnClear.addEventListener("click", () => {
    tasks = tasks.filter(t => !t.done);
    save(); render();
  });

  render();
</script>
</body>
</html>
